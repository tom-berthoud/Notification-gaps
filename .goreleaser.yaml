version: 2
before:
  hooks:
    - go mod tidy
    - go generate ./...
builds:
  - main: main.go
    id: gaps-cli
    binary: gaps-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - >-
        -s -w
        -X lutonite.dev/gaps-cli/_internal/version.version={{.Version}}
        -X lutonite.dev/gaps-cli/_internal/version.commit={{.FullCommit}}
        -X lutonite.dev/gaps-cli/_internal/version.date={{.Date}}
        -X lutonite.dev/gaps-cli/_internal/version.arch={{.Os}}/{{.Arch}}
archives:
  - id: gaps-cli
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
nfpms:
  - id: gaps-cli
    package_name: gaps-cli
    description: Discord bot to monitor GAPS grades and absences (HEIG-VD)
    vendor: Tom Berthoud
    homepage: https://github.com/tom-berthoud/Notification-gaps
    maintainer: Tom Berthoud <tom.berthoud@heig-vd.ch>
    license: LGPL-3.0
    formats:
      - apk
      - deb
      - rpm
      - archlinux
    bindir: /usr/local/bin
universal_binaries:
  - replace: false
dockers:
  - image_templates:
      - "ghcr.io/tom-berthoud/notification-gaps:{{ .Tag }}"
      - "ghcr.io/tom-berthoud/notification-gaps:v{{ .Major }}"
      - "ghcr.io/tom-berthoud/notification-gaps:v{{ .Major }}.{{ .Minor }}"
      - "ghcr.io/tom-berthoud/notification-gaps:latest"
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
release:
  github:
    owner: tom-berthoud
    name: Notification-gaps
  prerelease: auto
checksum:
  name_template: 'checksums.txt'
snapshot:
  name_template: "{{ incpatch .Version }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'

