name: GAPS scraper

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: gaps-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build -o gaps-cli .

      - name: Run scraper once
        env:
          GAPS_LOGIN_USERNAME: ${{ secrets.GAPS_LOGIN_USERNAME }}
          GAPS_LOGIN_PASSWORD: ${{ secrets.GAPS_LOGIN_PASSWORD }}
          GAPS_SCRAPER_API_URL: ${{ secrets.GAPS_SCRAPER_API_URL }}
          GAPS_SCRAPER_API_URL2: ${{ secrets.GAPS_SCRAPER_API_URL2 }}
          GAPS_HISTORY_GRADES_FILE: .gaps/grades-history.json
        run: |
          mkdir -p .gaps
          ./gaps-cli scraper --once

      - name: Commit updated history (if changed)
        run: |
          if git diff --quiet -- .gaps/grades-history.json; then
            echo "No history changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .gaps/grades-history.json
          git commit -m "chore: update grades history"
          git push
